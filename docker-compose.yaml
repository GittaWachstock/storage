services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres_db-2
    restart: always
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: server-2
    volumes:
      - ./server:/app
    ports:
      - "8000:8000"
    stdin_open: true
    env_file:
      - ./server/.env
    depends_on:
      - postgres
    networks:
      - app_network

  client-2:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client-2
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true
    env_file:
      - ./client/.env
    depends_on:
      - server
      - postgres
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
